<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hexagonal Chess</title>
    <link rel="icon" type="image/svg+xml" sizes="192x192" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22white%22 stroke=%22black%22 stroke-width=%224%22>♞</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23121212%22/><text x=%2250%22 y=%2275%22 font-size=%2280%22 text-anchor=%22middle%22 fill=%22white%22 stroke=%22black%22 stroke-width=%222%22>♞</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="coi-serviceworker.js"></script>
</head>
<body>
    <div id="ui-header">
        <button id="flip-btn">Flip Board</button>
        <div class="header-center">
            <div id="turn-display">White to Move</div>
            <div id="hover-coord">Hex: --</div>
        </div>
        <div id="status">Ready</div>
    </div>
    
    <div id="main-layout">
        <div id="game-container">
            <div id="canvas-wrapper">
                <canvas id="hex-canvas"></canvas>
            </div>
        </div>

        <div id="sidebar">
            <div class="control-section">
                <div class="button-grid">
                    <select id="mode-select">
                        <option value="hotseat">Local Hotseat</option>
                        <option value="ai-black">vs AI (Black)</option>
                        <option value="ai-white">vs AI (White)</option>
                    </select>
                    <select id="time-control">
                        <option value="unlimited">Unlimited</option>
                        <option value="10+0" selected>10 min</option>
                        <option value="15+10">15m + 10s</option>
                        <option value="5+5">5m + 5s</option>
                        <option value="3+2">3m + 2s</option>
                    </select>
                </div>
                
                <div class="button-grid">
                    <button id="undo-btn" disabled>⟲ Undo</button>
                    <button id="redo-btn" disabled>Redo ⟳</button>
                </div>

                <div class="button-grid">
                    <button id="reset-btn">Restart Game</button>
                    <button id="fen-btn">Copy FEN</button>
                </div>
            </div>

            <div class="status-section">
                <div class="player-block">
                    <div class="clock-row">
                        <span class="indicator w">W</span>
                        
                        <div class="player-actions">
                            <button id="w-draw-btn">Draw</button>
                            <button id="w-resign-btn">Resign</button>
                        </div>
                        
                        <div id="white-timer" class="clock-display">10:00</div>
                    </div>
                    <div id="white-captures" class="capture-box"></div>
                </div>

                <div class="player-block">
                    <div class="clock-row">
                        <span class="indicator b">B</span>
                        
                        <div class="player-actions">
                            <button id="b-draw-btn">Draw</button>
                            <button id="b-resign-btn">Resign</button>
                        </div>
                        
                        <div id="black-timer" class="clock-display">10:00</div>
                    </div>
                    <div id="black-captures" class="capture-box"></div>
                </div>
            </div>

            <div class="history-section">
                <div class="section-title">Move History</div>
                <div id="move-list"></div>
            </div>
        </div>
    </div>

    <div id="promotion-modal" class="hidden modal">
        <h3>Pawn Promotion</h3>
        <div id="promotion-options">
            <button data-piece="Q">Queen</button>
            <button data-piece="R">Rook</button>
            <button data-piece="B">Bishop</button>
            <button data-piece="N">Knight</button>
        </div>
    </div>

    <div id="game-over-modal" class="hidden modal">
        <h2 id="game-over-title">Game Over</h2>
        <p id="game-over-message"></p>
        <button id="restart-btn" class="primary">Play Again</button>
    </div>

    <script src="logic.js"></script>
</body>
</html>
